name: Run test for a PR
on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    name: PR check test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Execute unit tests
        run: |
          # Safe cleanup of legacy temporary directory locks
          rm -rf /tmp/chromedriver /tmp/chrome ./.wdio-cache
          
          # Run the unit configurations cleanly
          npx wdio run ./wdio.unit.conf.ts
        env:
          WDIO_PRESET: lit